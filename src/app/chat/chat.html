<div class="chat-container">
  <!-- Chat Toggle Button -->
  <button class="chat-toggle" (click)="toggleChat()" [class.active]="isChatOpen()">
    <span class="chat-icon">💬</span>
  </button>

  <!-- Chat Window -->
  <div class="chat-window" [class.open]="isChatOpen()">
    <!-- Header -->
    <div class="chat-header">
      <h3>Foodie Assistant</h3>
      <div class="header-actions">
        <button class="clear-btn" (click)="clearHistory()" title="Clear chat history">
          🔄
        </button>
        <button class="close-btn" (click)="toggleChat()" title="Close chat">
          ✕
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages">
      @for (msg of messages(); track $index) {
        <div class="message" [class.user]="msg.role === 'user'" [class.assistant]="msg.role === 'assistant'">
          <div class="message-content">
            {{ msg.content }}
          </div>
          
          <!-- Display image if present -->
          @if (msg.imageUrl) {
            <div class="message-image">
              <img [src]="msg.imageUrl" [alt]="msg.content" />
            </div>
          }
        </div>
      }
      
      @if (isLoading()) {
        <div class="message assistant typing">
          <div class="message-content">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
      }
    </div>

    <!-- Input -->
    <div class="chat-input">
      <input 
        type="text" 
        [(ngModel)]="userInput"
        (keyup.enter)="sendMessage()"
        placeholder="Ask about our menu..."
        [disabled]="isLoading()"
      />
      <button 
        (click)="sendMessage()" 
        [disabled]="isLoading() || !userInput().trim()"
        class="send-btn"
      >
        @if (!isLoading()) {
          Send
        } @else {
          ...
        }
      </button>
    </div>
  </div>
</div>
